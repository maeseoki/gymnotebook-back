name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - copilot/rewrite-spring-boot-to-fastify

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.2 --activate

      - name: Locate pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-node24-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node24-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and HTTP tests
        run: pnpm test

      - name: MySQL integration tests
        run: pnpm test:integration

      - name: Coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Repository check
        run: pnpm check

      - name: Docker image
        run: docker build -f apps/api/Dockerfile .
